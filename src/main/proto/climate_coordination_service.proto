syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.climatecoordinationservice";
option java_outer_classname = "ClimateCoordinationServiceImpl";

package ClimateCoordinationService;

// ClimateCoordinationService serves as a control panel that connects
// multiple disaster management agencies together using two-way
// communication channel.

service ClimateCoordinationService {

  // BIDIRECTIONAL STREAMING RPC
  rpc coordinateResponse (stream CoordinationMessage) returns (stream CoordinationResponse) {}

}

// Sensor-Streaming Method

// Request Message:
message CoordinationMessage {

  string message_id      = 1;  // Unique ID for this specific message in the stream
                                // e.g. "MSG-FireSvc-001", "MSG-FireSvc-002"

  string sender_org      = 2;  // Name of the agency sending this update
                                // e.g. "Lagos Fire Service", "Federal Meteorology Dept",
                                // "National Disaster Management Agency", "Forest Rangers Unit"

  string sender_id       = 3;  // Unique identifier of this specific responder/unit
                                // e.g. "UNIT-LAGOS-FIRE-04", "MET-OFFICER-KANO-01"

  int32  priority        = 4;  // Urgency level of this message
                                // 1 = LOW    (routine update, no immediate danger)
                                // 2 = MEDIUM (situation developing, monitoring needed)
                                // 3 = HIGH   (active threat, response required soon)
                                // 4 = CRITICAL (life-threatening, immediate action needed)

  string region_id       = 5;  // The geographic zone this message refers to
                                // e.g. "ZONE-A-LAGOS", "ZONE-C-KANO", "ZONE-F-ABUJA"

  string event_type      = 6;  // Category of emergency being reported
                                // e.g. "WILDFIRE", "DROUGHT", "FLOOD", "DEFORESTATION"

  string status_update   = 7;  // Plain text description of the current ground situation
                                // e.g. "Fire front 2km wide advancing NE at 60km/h.
                                //        Road access cut off. Requesting evacuation order."

  float  latitude        = 8;  // Current GPS latitude of the situation being reported
  float  longitude       = 9;  // Current GPS longitude of the situation being reported

  float  fire_spread_km  = 10; // Estimated area affected by fire in square kilometres
                                // e.g. 4.7 - used by server to scale response intensity

  bool   resources_needed = 11; // true if the agency is requesting additional resources
                                 // Triggers the server to include resource allocation in response

  string resource_type   = 12; // Type of resource being requested if resources_needed is true
                                // e.g. "AERIAL_SUPPORT", "WATER_TANKERS",
                                // "MEDICAL_TEAM", "EVACUATION_BUSES"

  int64  timestamp       = 13; // Unix time in milliseconds when this message was sent
}

// Response Message:
message CoordinationResponse {

  string response_id         = 1;  // Unique ID for this response message
                                    // e.g. "RESP-SERVER-20260305-001"

  string region_id           = 2;  // The zone this response instruction applies to
                                    // e.g. "ZONE-A-LAGOS"

  string event_type          = 3;  // The type of event this response addresses
                                    // e.g. "WILDFIRE", "DROUGHT"

  string wildfire_risk_level = 4;  // Current server-computed risk level for this region
                                    // Values: "LOW", "MEDIUM", "HIGH", "CRITICAL"

  string recommended_action  = 5;  // Primary action the server recommends
                                    // e.g. "Initiate immediate evacuation of villages
                                    //        within 10km radius of fire front."

  string target_agency       = 6;  // Which agency this instruction is directed at
                                    // e.g. "Lagos Fire Service", "ALL_AGENCIES"
                                    // Use "ALL_AGENCIES" to broadcast to every connected agency

  string resource_allocation = 7;  // Resources the server is dispatching or reallocating
                                    // e.g. "2 x aerial water bombers en route. ETA 18 mins."

  string predicted_spread    = 8;  // Server prediction of how the situation will evolve
                                    // e.g. "Based on current wind data, fire will reach Zone B
                                    //        in approximately 35 minutes."

  int32  priority            = 9;  // Urgency level of this response instruction
                                    // 1 = LOW, 2 = MEDIUM, 3 = HIGH, 4 = CRITICAL

  bool   evacuation_required = 10; // true if the server has determined evacuation is necessary
                                    // The GUI will display a prominent evacuation warning when true

  float  evacuation_radius_km = 11; // If evacuation_required is true, the recommended
                                     // evacuation radius in kilometres from the fire centre
                                     // e.g. 10.0

  string coordination_notes  = 12; // Additional situational awareness notes for all agencies
                                    // e.g. "Wind speed increasing. Do not position units NE of fire.
                                    //        Next update in 5 minutes."

  int64  timestamp           = 13; // Unix time in milliseconds when the server generated this response
}

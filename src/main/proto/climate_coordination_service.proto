syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.climatecoordinationservice";
option java_outer_classname = "ClimateCoordinationServiceImpl";

package sdg15.coordination;

service ClimateCoordinationService {
  rpc coordinateResponse (stream CoordinationMessage) returns (stream CoordinationResponse) {}
}

message CoordinationMessage {
  string message_id       = 1;
  string sender_org       = 2;
  string sender_id        = 3;
  int32  priority         = 4;
  string region_id        = 5;
  string event_type       = 6;
  string status_update    = 7;
  float  latitude         = 8;
  float  longitude        = 9;
  float  fire_spread_km   = 10;
  bool   resources_needed = 11;
  string resource_type    = 12;
  int64  timestamp        = 13;
}

message CoordinationResponse {
  string response_id          = 1;
  string region_id            = 2;
  string event_type           = 3;
  string wildfire_risk_level  = 4;
  string recommended_action   = 5;
  string target_agency        = 6;
  string resource_allocation  = 7;
  string predicted_spread     = 8;
  int32  priority             = 9;
  bool   evacuation_required  = 10;
  float  evacuation_radius_km = 11;
  string coordination_notes   = 12;
  int64  timestamp            = 13;
}

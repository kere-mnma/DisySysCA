syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.alertservice";
option java_outer_classname = "AlertServiceImpl";

package AlertService;


// AlertService is the emergency siren used for two purposes to alerts the sensor system (Unary RPC) 
// and allows the clients (emergency responders) to subscribe to a geographic region
// and receive a live stream threat notifications when dangers are detected (Server Streaming RPC).


service AlertService {

  // The sensor system reports a confirmed environmental incident to the server (Unary RPC). 
  rpc reportIncident (IncidentReport) returns (IncidentAcknowledgement) {}

  // The clients subscribes to alerts for a specific geographic region (SERVER STREAMING RPC). 
  rpc subscribeToAlerts (AlertSubscription) returns (stream AlertNotification) {}

}


// IncidentReport: Used as a request message to send information from the client node to the server
message IncidentReport {

  string incident_id   = 1;  // Unique ID generated by the client for this report
                              // e.g. "RPT-SENSOR007-1741219200000"                             

  string region_id     = 2;  // ID of the geographic zone where incident occurred
                              // e.g. "ZONE-A-LAGOS", "ZONE-C-KANO", "ZONE-F-ABUJA"

  string event_type    = 3;  // Category of environmental incident detected
                              // Accepted values: "WILDFIRE", "DROUGHT","HEATWAVE"
                           
  string severity      = 4;  // How dangerous the incident is right now
                              // Accepted values: "LOW", "MEDIUM", "HIGH", "CRITICAL"

  float  latitude      = 5;  // GPS latitude of the incident location
                              // e.g. 6.5244 (Lagos, Nigeria)

  float  longitude     = 6;  // GPS longitude of the incident location
                              // e.g. 3.3792 (Lagos, Nigeria)

  float  temperature   = 7;  // Recorded temperature at the incident site in Celsius
                              // e.g. 47.5 - helps server assess fire weather conditions

  float  humidity      = 8;  // Recorded humidity at the incident site in percent
                              // e.g. 8.2 - low humidity accelerates wildfire spread

  string reporter_id   = 9;  // ID of the entity filing this report
                              // e.g. "SENSOR-007", "FireService-Lagos", "SAT-IMG-003"

  int64  timestamp     = 10; // Unix time in milliseconds when the incident was detected
                              // e.g. 1741219200000

  string notes         = 11; // Optional additional context about the incident
                              // e.g. "Strong north wind recorded, fire spreading rapidly"
}


// A response message returned by the server after receiving the request message
message IncidentAcknowledgement {

  string incident_id       = 1;  // Same incident ID from the original IncidentReport
                                  // Allows the client to match this response to its request

  string status            = 2;  // Outcome of the report processing
                                  // Values: "LOGGED", "ESCALATED", "DUPLICATE", "FAILED"
                                  // ESCALATED means severity was CRITICAL and authorities notified

  string assigned_team     = 3;  // Emergency team assigned to respond to this incident
                                  // e.g. "Rapid Response Unit - Lagos North"

  string estimated_arrival = 4;  // Estimated time for response team to reach the site
                                  // e.g. "12 minutes", "ETA: 14:35 WAT"

  string message           = 5;  // Human-readable confirmation for logging/display
                                  // e.g. "Wildfire incident CRITICAL logged. Team dispatched."

  int64  logged_at         = 6;  // Unix timestamp when the server processed and stored the report
}


// The clients sends a request message to the server to subscribe for alerts
message AlertSubscription {

  string subscriber_id  = 1;  // Unique ID of the client subscribing
                               // e.g. "DASHBOARD-NCI-001", "RESPONDER-KANO-04"

  string region_id      = 2;  // Geographic zone to monitor
                               // e.g. "ZONE-A-LAGOS", "ZONE-C-KANO"
                               // Use "ALL" to subscribe to alerts from all regions

  string min_risk_level = 3;  // Only receive alerts at or above this risk threshold
                               // Accepted values: "LOW", "MEDIUM", "HIGH", "CRITICAL"
                               // e.g. "HIGH" means only HIGH and CRITICAL alerts are sent

  repeated string event_filter = 4; // Optional: filter alerts by event type
                                     // e.g. ["WILDFIRE", "DROUGHT"]
                                     // Leave empty to receive all event types
}


// the server sends a message back to the clients when a threat is detected
message AlertNotification {

  string alert_id       = 1;  // Unique ID for this specific notification
                               // e.g. "ALERT-20260305-007"

  string region_id      = 2;  // Zone where this threat was detected
                               // e.g. "ZONE-A-LAGOS"

  string event_type     = 3;  // Type of environmental threat detected
                               // e.g. "WILDFIRE", "DROUGHT", "HEATWAVE"

  string risk_level     = 4;  // Current assessed danger level for this event
                               // Values: "LOW", "MEDIUM", "HIGH", "CRITICAL"

  float  temperature    = 5;  // Current temperature recorded at alert location in Celsius
                               // e.g. 49.1

  float  humidity       = 6;  // Current humidity at alert location in percent
                               // e.g. 6.3 - critical if below 15%

  float  wind_speed     = 7;  // Wind speed in km/h - affects wildfire spread rate
                               // e.g. 55.0

  float  latitude       = 8;  // GPS latitude of the detected threat
  float  longitude      = 9;  // GPS longitude of the detected threat

  string description    = 10; // Plain text summary of the detected threat
                               // e.g. "Wildfire front advancing north at 55km/h. Evacuate immediately."

  string recommended_action = 11; // Automated action the server recommends
                                   // e.g. "Deploy aerial water bombers. Evacuate 5km radius."

  int64  timestamp      = 12; // When this alert was generated by the server (Unix milliseconds)
}

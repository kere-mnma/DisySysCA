syntax = "proto3";

option java_multiple_files = true;
option java_package = "generated.grpc.alertservice";
option java_outer_classname = "AlertServiceImpl";

package sdg15.alert;

service AlertService {
  rpc reportIncident (IncidentReport) returns (IncidentAcknowledgement) {}
  rpc subscribeToAlerts (AlertSubscription) returns (stream AlertNotification) {}
}

message IncidentReport {
  string incident_id   = 1;
  string region_id     = 2;
  string event_type    = 3;
  string severity      = 4;
  float  latitude      = 5;
  float  longitude     = 6;
  float  temperature   = 7;
  float  humidity      = 8;
  string reporter_id   = 9;
  int64  timestamp     = 10;
  string notes         = 11;
}

message IncidentAcknowledgement {
  string incident_id       = 1;
  string status            = 2;
  string assigned_team     = 3;
  string estimated_arrival = 4;
  string message           = 5;
  int64  logged_at         = 6;
}

message AlertSubscription {
  string subscriber_id  = 1;
  string region_id      = 2;
  string min_risk_level = 3;
  repeated string event_filter = 4;
}

message AlertNotification {
  string alert_id           = 1;
  string region_id          = 2;
  string event_type         = 3;
  string risk_level         = 4;
  float  temperature        = 5;
  float  humidity           = 6;
  float  wind_speed         = 7;
  float  latitude           = 8;
  float  longitude          = 9;
  string description        = 10;
  string recommended_action = 11;
  int64  timestamp          = 12;
}
